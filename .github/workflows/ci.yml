name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test-erlang:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp-version: ["26", "27", "28"]
    name: Test Erlang (OTP ${{ matrix.otp-version }})
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Write BEAM tool versions
        run: |
          printf 'erlang %s\ngleam 1.16.0\nrebar 3\n' '${{ matrix.otp-version }}' > .tool-versions

      - name: Setup environment
        uses: tylerbutler/actions/setup-gleam@c3de10f5c576265f4910698528d949179081f25b # ratchet:tylerbutler/actions/setup-gleam@main
        with:
          version-type: loose

      - name: Check formatting
        run: just format-check

      - name: Type check
        run: just check

      - name: Build (warnings as errors)
        run: just build-strict

      - name: Run tests
        run: just test

  docs:
    runs-on: ubuntu-latest
    name: Docs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Write BEAM tool versions
        run: |
          printf 'erlang 27\ngleam 1.16.0\nrebar 3\n' > .tool-versions

      - name: Setup environment
        uses: tylerbutler/actions/setup-gleam@c3de10f5c576265f4910698528d949179081f25b # ratchet:tylerbutler/actions/setup-gleam@main
        with:
          version-type: loose

      - name: Build documentation
        run: just docs
